name: Vendor Sync

on:
  repository_dispatch:
    types:
      - vendor-main-updated
  workflow_dispatch:

jobs:
  sync-vendor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout internal repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Generate internal GitHub App token
        id: internal_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: GitHubActionsPOC
          repositories: gh-blue-yonder-testing-prod-15

      - name: Generate vendor GitHub App token
        id: vendor_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.VENDOR_APP_ID }}
          private-key: ${{ secrets.VENDOR_APP_PRIVATE_KEY }}
          owner: guptadiya
          repositories: sync-test-prod-15

      - name: Configure git identity
        run: |
          git config --local user.name "vendor-sync-bot"
          git config --local user.email "vendor-sync-bot@users.noreply.github.com"

      - name: Configure internal repository authentication
        env:
          TOKEN: ${{ steps.internal_token.outputs.token }}
        run: |
          git config --local http.https://github.com/GitHubActionsPOC/gh-blue-yonder-testing-prod-15.git.extraheader \
            "AUTHORIZATION: basic $(printf 'x-access-token:%s' "$TOKEN" | base64)"

      - name: Configure vendor repository authentication
        env:
          TOKEN: ${{ steps.vendor_token.outputs.token }}
        run: |
          git config --local http.https://github.com/guptadiya/sync-test-prod-15.git.extraheader \
            "AUTHORIZATION: basic $(printf 'x-access-token:%s' "$TOKEN" | base64)"

      - name: Configure vendor remote
        run: |
          git remote remove vendor || true
          git remote add vendor https://github.com/guptadiya/sync-test-prod-15.git

      - name: Fetch vendor main
        run: |
          git fetch vendor main

      - name: Exact mirror vendor main
        run: |
          git checkout main
          git reset --hard vendor/main

      - name: Force push mirrored main
        run: |
          git push origin main --force
